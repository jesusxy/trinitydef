{{ define "main" }}
  <header class="page-header">
    <div class="eyebrow">TECHNICAL RECORDS / MALWARE &amp; SECURITY</div>
    <h1>/labs/</h1>
    <div class="page-deck">{{ .Content }}</div>
    <div class="page-specs">
      <span><b>CLASS</b> ANALYSIS</span>
      <span><b>RECORDS</b> {{ len .Pages }}</span>
      <span><b>HANDLING</b> PUBLIC</span>
    </div>
  </header>
  <section class="archive-section">
    <div class="section-control">
      <span>LABS / RECORD INDEX</span>
      <span>SORT: DATE DESC</span>
    </div>
    <div class="record-table">
      <div class="record-row record-head" aria-hidden="true">
        <span>ID</span>
        <span>CLASS</span>
        <span>SUBJECT</span>
        <span>STATUS</span>
        <span>DATE</span>
      </div>
      {{ range .Pages.ByDate.Reverse }}
        {{ partial "record-row.html" . }}
      {{ end }}
    </div>
  </section>
{{ end }}
